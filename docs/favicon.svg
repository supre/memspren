<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0066cc"/>

  <!-- Three interconnected nodes representing Zettelkasten concept -->
  <!-- Top node -->
  <circle cx="32" cy="16" r="6" fill="white"/>

  <!-- Bottom left node -->
  <circle cx="14" cy="44" r="6" fill="white"/>

  <!-- Bottom right node -->
  <circle cx="50" cy="44" r="6" fill="white"/>

  <!-- Connecting lines (links) -->
  <!-- Top to bottom left -->
  <line x1="28.8" y1="21.2" x2="17.2" y2="38.8" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Top to bottom right -->
  <line x1="35.2" y1="21.2" x2="46.8" y2="38.8" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Bottom left to bottom right -->
  <line x1="20" y1="44" x2="44" y2="44" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
</svg>
